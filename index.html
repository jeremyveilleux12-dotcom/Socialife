<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialife - Chat Privé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        #chat-box { scroll-behavior: smooth; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-zinc-900">

<div x-data="chatApp()" x-init="init()" x-cloak>
    <template x-if="!user">
        <div class="fixed inset-0 flex items-center justify-center bg-white p-4 z-50">
            <div class="w-full max-w-sm text-center">
                <h1 class="text-4xl font-black mb-8 text-blue-600 italic tracking-tighter">Socialife</h1>
                <div class="bg-white border shadow-2xl rounded-3xl p-8 space-y-4">
                    <input type="email" x-model="email" placeholder="Email" class="w-full border-zinc-200 border p-4 rounded-2xl outline-blue-500 bg-zinc-50">
                    <input type="password" x-model="password" placeholder="Mot de passe" class="w-full border-zinc-200 border p-4 rounded-2xl outline-blue-500 bg-zinc-50">
                    <button @click="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all">Connexion</button>
                    <button @click="register()" class="text-blue-500 text-sm font-semibold hover:underline">Créer un compte</button>
                </div>
                <p class="mt-6 text-red-500 font-bold text-sm h-4" x-text="status"></p>
            </div>
        </div>
    </template>

    <template x-if="user">
        <div class="flex h-screen max-w-5xl mx-auto bg-white shadow-2xl overflow-hidden border-x">
            <main class="flex-1 flex flex-col w-full">
                <header class="p-4 border-b flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="font-black text-xl text-blue-600 tracking-tight">Socialife</span>
                    </div>
                    <button @click="logout()" class="text-xs font-bold text-zinc-400 hover:text-red-500 transition-colors uppercase tracking-widest">Quitter</button>
                </header>

                <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-zinc-50" id="chat-box">
                    <template x-for="post in posts" :key="post.id">
                        <div class="flex flex-col" :class="post.author === user.email.split('@')[0] ? 'items-end' : 'items-start'">
                            <div class="flex items-center gap-2 mb-1 px-2">
                                <span class="text-[11px] font-bold text-zinc-500" x-text="post.author"></span>
                                <span class="text-[10px] text-zinc-400" x-text="formatDate(post.created_at)"></span>
                            </div>
                            <div class="p-3 rounded-2xl max-w-[85%] shadow-sm" 
                                 :class="post.author === user.email.split('@')[0] ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-zinc-800 rounded-tl-none border border-zinc-200'">
                                <template x-if="post.content && post.content.startsWith('IMG:')">
                                    <img :src="post.content.replace('IMG:', '')" @click="window.open(post.content.replace('IMG:', ''), '_blank')" class="rounded-xl max-h-80 w-full object-cover cursor-zoom-in hover:opacity-95">
                                </template>
                                <template x-if="post.content && !post.content.startsWith('IMG:')">
                                    <p x-text="post.content" class="text-[15px] leading-relaxed break-words"></p>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <footer class="p-4 border-t bg-white">
                    <div class="max-w-4xl mx-auto flex flex-col gap-2">
                        <div class="flex items-center gap-3">
                            <label class="group cursor-pointer bg-zinc-100 p-4 rounded-2xl hover:bg-blue-50 transition-colors border border-transparent hover:border-blue-200">
                                <input type="file" class="hidden" @change="uploadImage($event)" accept="image/*">
                                <span class="text-xl">📷</span>
                            </label>
                            
                            <input type="text" x-model="newMsg" @keyup.enter="send()" placeholder="Écris ton message..." class="flex-1 bg-zinc-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-zinc-900">
                            
                            <button @click="send()" class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold shadow-md active:scale-95 disabled:opacity-50" :disabled="!newMsg.trim()">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                            </button>
                        </div>
                        <p x-show="status" x-transition class="text-[11px] font-bold text-blue-600 text-center uppercase tracking-tighter" x-text="status"></p>
                    </div>
                </footer>
            </main>
        </div>
    </template>
</div>
